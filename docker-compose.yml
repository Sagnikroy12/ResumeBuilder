version: '3.9'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: resume_builder_web
    ports:
      - "5000:5000"
    environment:
      - FLASK_APP=run.py
      - FLASK_ENV=development
      - DEBUG=True
    volumes:
      - .:/app
      - uploads:/app/uploads
    command: flask run --host=0.0.0.0
    networks:
      - resume_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

volumes:
  uploads:
    driver: local

networks:
  resume_network:
    driver: bridge
