<!doctype html>

<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Resume Builder - Create Your Perfect Resume</title>

    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}"
    />
  </head>

  <body>
    <!-- PAGE HEADER -->
    <div class="page-header">
      <h1>✨ Resume Builder</h1>
      <p>Create a professional resume in minutes with beautiful templates</p>
    </div>

    <div class="layout">
      <!-- LEFT PANEL : FORM -->

      <div class="form-panel">
        <h2>Build Your Resume</h2>

        <form method="POST" id="resume-form">
          <!-- TEMPLATE -->

          <h3>📋 Template</h3>

          <select name="template" id="template" onchange="updatePreview()">
            <option value="template1">Classic</option>
            <option value="template2">Modern</option>
            <option value="template3" selected>Professional</option>
          </select>

          <!-- CONTACT -->

          <h3>👤 Contact Information</h3>

          <label>Name</label>
          <input type="text" name="name" id="name" placeholder="Full Name" oninput="updatePreview()" />

          <label>Address</label>
          <input
            type="text"
            name="address"
            id="address"
            placeholder="City, Country"
            oninput="updatePreview()"
          />

          <label>Phone</label>
          <input
            type="text"
            name="phone"
            id="phone"
            placeholder="+1 (555) 123-4567"
            oninput="updatePreview()"
          />

          <label>Email</label>
          <input
            type="email"
            name="email"
            id="email"
            placeholder="your.email@example.com"
            oninput="updatePreview()"
          />

          <label>LinkedIn</label>
          <input
            type="text"
            name="linkedin"
            id="linkedin"
            placeholder="https://linkedin.com/in/yourprofile"
            oninput="updatePreview()"
          />

          <!-- SECTIONS CONTAINER -->

          <div id="sections-container">
            <!-- OBJECTIVE -->

            <div class="resume-section" data-section="objective">
              <h3>Objective</h3>

              <textarea
                name="objective"
                id="objective"
                placeholder="e.g., Seeking a challenging role in software development..."
                oninput="updatePreview()"
              ></textarea>
            </div>

            <!-- SKILLS -->

            <div class="resume-section" data-section="skills">
              <h3>Skills</h3>

              <textarea
                name="skills"
                id="skills"
                placeholder="One skill per line
Example:
Languages: Python, JavaScript, Java
Frameworks: Flask, React, Django"
                oninput="updatePreview()"
              ></textarea>
            </div>

            <!-- EXPERIENCE -->

            <div class="resume-section" data-section="experience">
              <h3>Experience</h3>

              <div id="experience-container"></div>

              <button type="button" onclick="addExperience()">
                + Add Experience
              </button>
            </div>

            <!-- PROJECTS -->

            <div class="resume-section" data-section="projects">
              <h3>Projects</h3>

              <textarea
                name="projects"
                id="projects"
                placeholder="One project per line
Example:
Web App - Built a real-time collaboration tool with React
Mobile App - Developed iOS app for fitness tracking"
                oninput="updatePreview()"
              ></textarea>
            </div>

            <!-- EDUCATION -->

            <div class="resume-section" data-section="education">
              <h3>Education</h3>

              <textarea
                name="education"
                id="education"
                placeholder="e.g., Bachelor's Degree in Computer Science - University Name, Graduation: 2020"
                oninput="updatePreview()"
              ></textarea>
            </div>

            <!-- CERTIFICATIONS -->

            <div class="resume-section" data-section="certifications">
              <h3>Certifications</h3>

              <textarea
                name="certifications"
                id="certifications"
                placeholder="One certification per line
Example:
AWS Certified Solutions Architect
Google Cloud Professional Data Engineer"
                oninput="updatePreview()"
              ></textarea>
            </div>

            <!-- CUSTOM SECTIONS -->

            <div class="resume-section" data-section="custom">
              <h3>Custom Sections</h3>

              <div id="custom-section-container"></div>

              <button type="button" onclick="addCustomSection()">
                + Add Custom Section
              </button>
            </div>
          </div>

          <button type="submit">📥 Generate & Download Resume</button>
        </form>
      </div>

      <!-- RIGHT PANEL : LIVE PREVIEW -->

      <div class="preview-panel">
        <div class="preview-header">Live Preview from the Cloud</div>

        <div class="preview-cloud">
          <iframe
            id="preview-box"
            style="width: 100%; height: 100%; border: none; background: white;"
          >
          </iframe>
        </div>
      </div>
    </div>

    <!-- LIBRARIES -->

    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>

    <script src="{{ url_for('static', filename='js/form.js') }}"></script>
  </body>
</html>
