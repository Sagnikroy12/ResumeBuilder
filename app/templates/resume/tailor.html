{% extends "base.html" %}

{% block title %}Tailor Resume - Premium Resume Builder{% endblock %}

{% block content %}
<div class="container mt-5">
    <h2>Tailor Resume to Job Description</h2>
    <p class="text-muted">Upload your resume and provide a job description to get a tailored version.</p>
    
    <div class="card p-4 mt-4">
        <form action="{{ url_for('resume.tailor') }}" method="post" enctype="multipart/form-data">
            <div class="mb-3">
                <label for="template" class="form-label">Choose a Template</label>
                <select name="template" id="template" class="form-select mb-2">
                    <option value="template1">Classic - Traditional, clean layout</option>
                    <option value="template2">Modern - Contemporary, space-efficient</option>
                    <option value="template3" selected>Professional - ATS-optimized, bold headers</option>
                </select>
            </div>

            <div class="mb-3">
                <label for="resume_file" class="form-label">Select Your Resume</label>
                <input class="form-control" type="file" id="resume_file" name="resume_file" accept=".pdf,.doc,.docx,.txt" required>
            </div>
            <div class="mb-3">
                <label for="job_description" class="form-label">Job Description</label>
                <textarea class="form-control" id="job_description" name="job_description" rows="10" placeholder="Paste the job description here..." required></textarea>
            </div>
            <button type="submit" class="btn btn-primary">Tailor Resume</button>
            <a href="{{ url_for('dashboard.index') }}" class="btn btn-outline-secondary">Back to Dashboard</a>
        </form>
    </div>
</div>
{% endblock %}
