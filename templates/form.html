<!DOCTYPE html>
<html>
<head>
    <title>Resume Builder</title>
</head>
<body>
    <h2>Resume Builder</h2>
    <form method="post">
        Name: <input type="text" name="name"><br>
        Address: <input type="text" name="address"><br>
        Phone: <input type="text" name="phone"><br>
        Email: <input type="text" name="email"><br>
        LinkedIn: <input type="text" name="linkedin"><br>
        Objective: <input type="text" name="objective"><br>
        Education: <input type="text" name="education"><br>
        Skills: <input type="text" name="skills"><br>
        Experience: <input type="text" name="experience"><br>
        Projects: <input type="text" name="projects"><br>
        Certifications: <input type="text" name="certifications"><br>
        <input type="submit" value="Submit">
    </form>
</body>
</html>
